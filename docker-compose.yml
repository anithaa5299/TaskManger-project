
services:
  db:
    image: postgres:15
    container_name: task_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/taskdb

  worker:
    build: ./backend-app
    container_name: task_worker
    working_dir: /app
    command: python worker/worker.py
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/taskdb
  